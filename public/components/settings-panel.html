<!-- Settings Panel -->
<div id="settingsPanel" class="settings-panel">
    <div class="settings-content">
        <h2>Settings</h2>
        
        <div class="settings-form">
            <div class="form-group">
                <label for="oldFolderPath">Old Files Folder Path:</label>
                <input type="text" id="oldFolderPath" placeholder="Path to old files folder" class="form-control">
            </div>
            
            <div class="form-group">
                <label for="newFolderPath">New Files Folder Path:</label>
                <input type="text" id="newFolderPath" placeholder="Path to new files folder" class="form-control">
            </div>
            
            <div class="form-group">
                <label for="keywordFilePath">Keyword File Path (optional):</label>
                <input type="text" id="keywordFilePath" placeholder="Path to keywords.txt file" class="form-control">
                <small class="form-text text-muted">Format: category:color:keyword or keyword:color</small>
            </div>
            
            <div class="button-group">
                <button id="saveSettingsButton" class="btn btn-primary">Save</button>
                <button id="closeSettingsButton" class="btn btn-secondary">Cancel</button>
            </div>
        </div>
    </div>
</div>
