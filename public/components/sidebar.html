<div class="sidebar">
    <div class="sidebar-header">
        <div class="header-with-filter">
            <div id="fileTypeFilter" class="file-type-filter-container full-width">
                <div class="filter-row">
                    <div class="filter-checkbox-container">
                        <input type="checkbox" id="filter-new-only" class="filter-checkbox" value="new-only" checked>
                        <label for="filter-new-only">🔵 New</label>
                    </div>
                    <div class="filter-checkbox-container">
                        <input type="checkbox" id="filter-old-only" class="filter-checkbox" value="old-only" checked>
                        <label for="filter-old-only">🟢 Old</label>
                    </div>
                </div>
                <div class="filter-row">
                    <div class="filter-checkbox-container">
                        <input type="checkbox" id="filter-comparison" class="filter-checkbox" value="comparison" checked>
                        <label for="filter-comparison">🟣 Comp</label>
                    </div>
                    <div class="filter-checkbox-container">
                        <input type="checkbox" id="filter-same-command" class="filter-checkbox" value="same-command" checked>
                        <label for="filter-same-command">🟠 Same</label>
                    </div>
                </div>
            </div>
        </div>
        <button class="toggle-sidebar">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 8 16">
                <path d="M5.5 3L0.5 8L5.5 13" fill="none" stroke="white" stroke-width="1.5" />
            </svg>
        </button>
    </div>
    
    <!-- Search bar for filtering files -->
    <div class="search-container">
        <div class="search-bar">
            <input type="text" id="fileSearchInput" placeholder="Search in files..." autocomplete="off">
            <button id="fileSearchButton" class="search-button" title="Search">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
            <button id="clearSearchButton" class="clear-button" title="Clear search" style="display: none;">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
        <div id="searchStatus" class="search-status" style="display: none;">
            <button id="resetSearchButton" class="reset-search-button">Reset</button>
        </div>
    </div>
    
    <!-- Unified file list container -->
    <div class="file-list-section">
        <!-- Filter message for when all file types are unchecked -->
        <div id="filterMessage" class="filter-message">
            <div class="filter-message-title">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
                No File Types Selected
            </div>
            <div class="filter-message-content">
                Please select at least one file type to view search results.
            </div>
            <div class="filter-message-actions">
                <button id="selectAllFilters" class="filter-message-button">Select All Types</button>
                <button id="selectRecommendedFilters" class="filter-message-button secondary">Select Recommended</button>
            </div>
        </div>
        
        <div id="unifiedFileList" class="file-list">
            <div class="loading">
                <div class="spinner"></div>
                Loading files...
            </div>
        </div>
    </div>
</div>
